services:
  db:
    image: pgvector/pgvector:0.8.1-pg18-trixie
    restart: always
    volumes:
      - db:/var/lib/postgresql/data
    stdin_open: true
    tty: true
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=family_dev
    ports:
      - 5432:5432

volumes:
  db:
