# fly.toml app configuration file generated for ancestry on 2026-03-25T09:15:03-03:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'ancestry'
primary_region = 'gru'
kill_signal = 'SIGTERM'
console_command = "/app/bin/ancestry remote"

[build]

[deploy]
  release_command = '/app/bin/migrate'

[env]
  PHX_HOST = 'ancestry.fly.dev'
  PORT = '8080'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

  [http_service.concurrency]
    type = 'connections'
    hard_limit = 1000
    soft_limit = 1000

[[vm]]
  memory = '512mb'
  cpus = 1
  memory_mb = 512
